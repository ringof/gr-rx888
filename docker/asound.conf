# gr-rx888 container ALSA config.
#
# Route ALSA's "default" device through the pulse plugin so audio
# forwards to the host's PulseAudio (or PipeWire-pulse compat) socket
# instead of contending with it for the hardware. Requires:
#
#   -v /run/user/$(id -u)/pulse:/tmp/pulse:ro
#   -e PULSE_SERVER=unix:/tmp/pulse/native
#
# The `plug` wrapper around the pulse slave is what makes
# audio.sink's hardware-param negotiation actually succeed — without
# it, ALSA's snd_pcm_hw_params_set_periods_near() hits "Invalid
# argument" because the pulse plugin only advertises specific period
# / buffer combinations and GR audio_alsa_sink asks for whatever it
# asks for. `plug` mediates the conversion transparently.

pcm.pulse {
    type pulse
    hint {
        description "PulseAudio Sound Server"
    }
}

ctl.pulse {
    type pulse
}

pcm.!default {
    type plug
    slave.pcm "pulse"
}

ctl.!default {
    type pulse
}
