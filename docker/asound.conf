# gr-rx888 container ALSA config.
#
# Route ALSA's "default" device through the pulse plugin so it
# forwards to the host's PulseAudio (or PipeWire-pulse compat)
# server. The container's `audio.sink` block ends up writing to the
# host's audio stack instead of contending with it for the hardware
# device, which would EBUSY.
#
# Requires the host to bind-mount its PulseAudio socket and to set
# PULSE_SERVER at docker run time:
#
#   -v /run/user/$(id -u)/pulse:/tmp/pulse:ro \
#   -e PULSE_SERVER=unix:/tmp/pulse/native
#
# If PULSE_SERVER is unset / unreachable inside the container, ALSA
# falls through to no-default and audio.sink fails to open — switch
# to the silent variant (am_bcb_demo.grc) in that case.

pcm.!default {
    type pulse
    fallback "sysdefault"
}

ctl.!default {
    type pulse
    fallback "sysdefault"
}
