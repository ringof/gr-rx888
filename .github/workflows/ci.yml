name: ci

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------
  # Build matrix: librx888 + gr-rx888 against the realistic Ubuntu set.
  # Each runner installs the distro's GR 3.10.x, builds librx888 from
  # tests/librx888/ overlaid on rx888-tools, then builds gr-rx888 and
  # runs hardware-free ctest + GRC compile.
  # ---------------------------------------------------------------------
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config git \
            libusb-1.0-0-dev usbutils \
            gnuradio gnuradio-dev \
            python3 python3-yaml python3-numpy

      - name: Resolve python interpreter for GR bindings
        id: pyint
        run: |
          # GR 3.10's pybind module is built for the system python3 on
          # each distro (3.10 on jammy, 3.12 on noble). Find the actual
          # python that has gnuradio.gr importable.
          for v in 3.13 3.12 3.11 3.10 3.9; do
            if /usr/bin/python$v -c "import gnuradio.gr" 2>/dev/null; then
              echo "py=/usr/bin/python$v" >> "$GITHUB_OUTPUT"
              echo "Using /usr/bin/python$v"
              exit 0
            fi
          done
          echo "no python with importable gnuradio.gr" >&2
          exit 1

      - name: Clone rx888-tools (for ezusb.* + rx888.h)
        run: |
          git clone --depth 1 https://github.com/ringof/rx888-tools.git /tmp/rx888-tools

      - name: Overlay librx888 sources from tests/librx888/
        run: |
          cp tests/librx888/librx888.h     /tmp/rx888-tools/include/
          cp tests/librx888/librx888.c     /tmp/rx888-tools/src/
          cp tests/librx888/rx888_stream.c /tmp/rx888-tools/src/
          cp tests/librx888/Makefile       /tmp/rx888-tools/

      - name: Build librx888 + install
        run: |
          cd /tmp/rx888-tools
          # rx888_dsp / iqrecord aren't relevant for librx888 CI; build
          # only the library + the CLI wrapper that links it.
          make librx888.so librx888.a librx888.pc rx888_stream
          # Install just the library artifacts and the wrapper binary.
          sudo install -d /usr/local/lib /usr/local/include /usr/local/lib/pkgconfig /usr/local/bin
          sudo install -m 755 librx888.so      /usr/local/lib/
          sudo install -m 644 librx888.a       /usr/local/lib/
          sudo install -m 644 include/librx888.h /usr/local/include/
          sudo install -m 644 librx888.pc      /usr/local/lib/pkgconfig/
          sudo install -m 755 rx888_stream     /usr/local/bin/
          sudo ldconfig

      - name: Verify pkg-config sees librx888
        run: |
          pkg-config --modversion librx888
          pkg-config --cflags --libs librx888

      - name: ABI check
        run: |
          # Public ABI must include every symbol in tests/expected-abi.txt.
          # Internal symbols (ezusb_*, control_send, …) are not checked.
          nm -D --defined-only /usr/local/lib/librx888.so \
            | awk '$2=="T" && $3 ~ /^rx888_/ {print $3}' \
            | sort > /tmp/actual-abi.txt
          grep -v '^#' tests/expected-abi.txt | grep -v '^$' | sort > /tmp/expected-abi.txt
          diff -u /tmp/expected-abi.txt /tmp/actual-abi.txt

      - name: Configure gr-rx888
        run: |
          mkdir build
          cd build
          cmake -DPYTHON_EXECUTABLE=${{ steps.pyint.outputs.py }} ..

      - name: Build gr-rx888
        run: cd build && make -j$(nproc)

      - name: ctest (hardware-free QA)
        run: cd build && ctest --output-on-failure

      - name: Install gr-rx888 so GRC can find the block
        run: cd build && sudo make install && sudo ldconfig

      - name: GRC block YAML parses
        run: |
          python3 -c "
          import yaml
          d = yaml.safe_load(open('grc/rx888_source.block.yml'))
          assert d['id'] == 'rx888_source', d['id']
          params = [p['id'] for p in d['parameters']]
          for required in ['samprate','atten','vga_gain','dither','rand','reference']:
              assert required in params, f'missing param: {required}'
          print('block YAML: OK')
          "

      - name: GRC flowgraph compiles
        run: |
          # Compile only — do NOT import the generated module. The
          # qt_gui template pulls in PyQt5 and gnuradio.qtgui at module
          # load time, which would need an X-less Qt setup in CI. The
          # grcc success itself is what we want to validate: the
          # rx888_source block YAML resolves, all params are wired,
          # and code generation succeeds.
          ${{ steps.pyint.outputs.py }} /usr/bin/grcc -o /tmp examples/hf_waterfall_demo.grc
          test -s /tmp/hf_waterfall_demo.py
          # Confirm the generated file references our block.
          grep -q "rx888.source" /tmp/hf_waterfall_demo.py
          echo "flowgraph compiles: OK"

      - name: Python block import smoke test
        run: |
          ${{ steps.pyint.outputs.py }} -c "
          from gnuradio import rx888
          src = rx888.source(samprate=32000000, atten=0.0, vga_gain=0.0,
                             dither=False, rand=True, reference=27e6)
          print('block constructs:', src)
          "

  # ---------------------------------------------------------------------
  # Mock build: build gr-rx888 against the in-tree mock librx888 and
  # run qa_source_mock, which exercises sample flow, dB->register
  # conversions, lifecycle, and the open-failure error path.
  # No librx888 install needed — the mock provides the ABI.
  # ---------------------------------------------------------------------
  mock:
    name: build with mock (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config \
            gnuradio gnuradio-dev \
            python3 python3-numpy

      - name: Resolve python interpreter for GR bindings
        id: pyint
        run: |
          for v in 3.13 3.12 3.11 3.10 3.9; do
            if /usr/bin/python$v -c "import gnuradio.gr" 2>/dev/null; then
              echo "py=/usr/bin/python$v" >> "$GITHUB_OUTPUT"
              echo "Using /usr/bin/python$v"
              exit 0
            fi
          done
          exit 1

      - name: Configure gr-rx888 with -DWITH_RX888_MOCK=ON
        run: |
          mkdir build
          cd build
          cmake -DPYTHON_EXECUTABLE=${{ steps.pyint.outputs.py }} \
                -DWITH_RX888_MOCK=ON ..

      - name: Build
        run: cd build && make -j$(nproc)

      - name: ctest (qa_source + qa_source_mock)
        run: cd build && ctest --output-on-failure

      - name: Verify mock ABI matches real librx888 public surface
        # The mock must export every symbol the real library does; tests
        # would otherwise miss accidental ABI drift between the two.
        run: |
          nm -D --defined-only build/tests/mock/librx888.so.0 \
            | awk '$2=="T" && $3 ~ /^rx888_/ {print $3}' \
            | sort > /tmp/mock-abi.txt
          grep -v '^#' tests/expected-abi.txt | grep -v '^$' | sort > /tmp/expected-abi.txt
          diff -u /tmp/expected-abi.txt /tmp/mock-abi.txt

  # ---------------------------------------------------------------------
  # ASan + UBSan against the mock build. Catches use-after-free, buffer
  # overflows, signed-overflow / shift-out-of-bounds in source_impl.cc
  # and librx888_mock. Leak detection is delegated to the valgrind job
  # because LSan against a Python interpreter that wasn't built with
  # ASan flags swamps signal with CPython init noise.
  # ---------------------------------------------------------------------
  sanitize-address:
    name: ASan + UBSan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config \
            gnuradio gnuradio-dev \
            python3 python3-numpy
      - name: Resolve python interpreter
        id: pyint
        run: |
          for v in 3.13 3.12 3.11 3.10 3.9; do
            if /usr/bin/python$v -c "import gnuradio.gr" 2>/dev/null; then
              echo "py=/usr/bin/python$v" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          exit 1
      - name: Configure (-DWITH_SANITIZE=address,undefined)
        run: |
          mkdir build && cd build
          cmake -DPYTHON_EXECUTABLE=${{ steps.pyint.outputs.py }} \
                -DWITH_RX888_MOCK=ON \
                -DWITH_SANITIZE=address,undefined \
                -DCMAKE_BUILD_TYPE=Debug ..
      - name: Build
        run: cd build && make -j$(nproc)
      - name: Pre-seed GNU Radio prefs to avoid throw-based vmcircbuf probing
        # When GR's vmcircbuf default-factory prefs file doesn't match
        # a known factory name, GR probes each factory by try/catch.
        # The Windows-only createfilemapping factory throws on Linux.
        # With libasan LD_PRELOADed AFTER libstdc++ is already mapped,
        # ASan's __cxa_throw interceptor is NULL and CHECK-fails the
        # process. The file content must match a factory->name()
        # return value EXACTLY (line, no trailing newline / whitespace).
        run: |
          mkdir -p "$HOME/.gnuradio/prefs"
          # sysv_shm doesn't depend on /dev/shm and is the factory
          # GR's auto-probe lands on locally on Debian/Ubuntu.
          printf 'gr::vmcircbuf_sysv_shm_factory' \
            > "$HOME/.gnuradio/prefs/vmcircbuf_default_factory"
          echo "Prefs file contents:"
          cat "$HOME/.gnuradio/prefs/vmcircbuf_default_factory"
          echo
          echo "Prefs file hexdump (to confirm no trailing bytes):"
          hexdump -C "$HOME/.gnuradio/prefs/vmcircbuf_default_factory"
          echo "HOME=$HOME"
          ls -la "$HOME/.gnuradio/prefs/"

      - name: ctest under ASan
        env:
          # ASan needs to be on the loader path before Python loads any
          # of our instrumented .so files; libasan is host-supplied.
          # detect_leaks=0: CPython / GR Python "still reachable" noise
          # would dwarf real signal. Leaks live in the valgrind job.
          # halt_on_error=0: continue past first error to surface all
          # diagnostics in one run instead of one-at-a-time.
          ASAN_OPTIONS: "abort_on_error=0:halt_on_error=0:exitcode=42:print_stacktrace=1:detect_leaks=0"
          UBSAN_OPTIONS: "abort_on_error=0:halt_on_error=0:exitcode=42:print_stacktrace=1"
        run: |
          export LD_PRELOAD=$(gcc -print-file-name=libasan.so)
          echo "=== sanitizer env ==="
          echo "LD_PRELOAD=$LD_PRELOAD"
          echo "ASAN_OPTIONS=$ASAN_OPTIONS"
          echo "UBSAN_OPTIONS=$UBSAN_OPTIONS"
          ls -la "$LD_PRELOAD"
          echo "=== running ctest -V ==="
          # -V: print every test's full output so CI logs show any
          # ASan diagnostic verbatim, not just ctest's pass/fail.
          cd build && ctest -V --timeout 120

  # ---------------------------------------------------------------------
  # ThreadSanitizer against the mock build. Verifies the SPSC ring's
  # producer/consumer atomics, the start/stop lifecycle handshake, and
  # the mock's synthesis thread interactions. Known noise from GR's
  # Thrift integration is suppressed via tests/tsan.supp.
  # qa_source has no real thread interactions and segfaults under TSan
  # preload (Python+Thrift quirk); we skip it and run only qa_source_mock.
  # ---------------------------------------------------------------------
  sanitize-thread:
    name: TSan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config \
            gnuradio gnuradio-dev \
            python3 python3-numpy
      - name: Resolve python interpreter
        id: pyint
        run: |
          for v in 3.13 3.12 3.11 3.10 3.9; do
            if /usr/bin/python$v -c "import gnuradio.gr" 2>/dev/null; then
              echo "py=/usr/bin/python$v" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          exit 1
      - name: Configure (-DWITH_SANITIZE=thread)
        run: |
          mkdir build && cd build
          cmake -DPYTHON_EXECUTABLE=${{ steps.pyint.outputs.py }} \
                -DWITH_RX888_MOCK=ON \
                -DWITH_SANITIZE=thread \
                -DCMAKE_BUILD_TYPE=Debug ..
      - name: Build
        run: cd build && make -j$(nproc)
      - name: Pre-seed GNU Radio prefs (avoid throw-based vmcircbuf probing)
        run: |
          mkdir -p "$HOME/.gnuradio/prefs"
          # sysv_shm doesn't need /dev/shm to be writable (works on GHA
          # runners where mmap_shm_open verification can fail). If GR
          # can't verify the chosen factory at runtime, it falls back
          # to probing — and the first probed factory is the Windows
          # createfilemapping one, which throws on Linux.
          echo -n "gr::vmcircbuf_sysv_shm_factory" \
            > "$HOME/.gnuradio/prefs/vmcircbuf_default_factory"
      - name: ctest under TSan (qa_source_mock only)
        env:
          TSAN_OPTIONS: "abort_on_error=0:exitcode=42:halt_on_error=0:report_signal_unsafe=0:second_deadlock_stack=1:suppressions=${{ github.workspace }}/tests/tsan.supp"
        run: |
          export LD_PRELOAD=$(gcc -print-file-name=libtsan.so)
          cd build && ctest --output-on-failure --timeout 120 -R qa_source_mock

  # ---------------------------------------------------------------------
  # Valgrind memcheck against a normal (non-sanitizer) mock build.
  # Catches definite leaks that escape ASan-with-detect_leaks=0, plus
  # uninitialized-memory reads (which memcheck flags more reliably than
  # ASan does). glibc / Python / GR init false positives suppressed via
  # tests/valgrind.supp.
  # ---------------------------------------------------------------------
  valgrind:
    name: valgrind memcheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config valgrind \
            gnuradio gnuradio-dev \
            python3 python3-numpy
      - name: Resolve python interpreter
        id: pyint
        run: |
          for v in 3.13 3.12 3.11 3.10 3.9; do
            if /usr/bin/python$v -c "import gnuradio.gr" 2>/dev/null; then
              echo "py=/usr/bin/python$v" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          exit 1
      - name: Configure (mock + Debug, no sanitizers)
        run: |
          mkdir build && cd build
          cmake -DPYTHON_EXECUTABLE=${{ steps.pyint.outputs.py }} \
                -DWITH_RX888_MOCK=ON \
                -DCMAKE_BUILD_TYPE=Debug ..
      - name: Build
        run: cd build && make -j$(nproc)
      - name: Pre-seed GNU Radio prefs (avoid throw-based vmcircbuf probing)
        # Not strictly required for valgrind (no LD_PRELOAD shenanigans),
        # but harmless and matches the other sanitized jobs.
        run: |
          mkdir -p "$HOME/.gnuradio/prefs"
          # sysv_shm doesn't need /dev/shm to be writable (works on GHA
          # runners where mmap_shm_open verification can fail). If GR
          # can't verify the chosen factory at runtime, it falls back
          # to probing — and the first probed factory is the Windows
          # createfilemapping one, which throws on Linux.
          echo -n "gr::vmcircbuf_sysv_shm_factory" \
            > "$HOME/.gnuradio/prefs/vmcircbuf_default_factory"
      - name: Run qa_source_mock under valgrind memcheck
        run: |
          export PYTHONPATH="${{ github.workspace }}/build/test_modules"
          export LIBRX888_MOCK_SO="${{ github.workspace }}/build/tests/mock/librx888.so"
          export LD_LIBRARY_PATH="${{ github.workspace }}/build/tests/mock:${{ github.workspace }}/build/lib"
          valgrind \
            --tool=memcheck \
            --error-exitcode=1 \
            --leak-check=full \
            --show-leak-kinds=definite \
            --errors-for-leak-kinds=definite \
            --suppressions=${{ github.workspace }}/tests/valgrind.supp \
            --num-callers=20 \
            ${{ steps.pyint.outputs.py }} \
            ${{ github.workspace }}/python/rx888/qa_source_mock.py

  # ---------------------------------------------------------------------
  # Static analysis: shell + Dockerfile lint, GRC YAML syntax.
  # Fast, no compile.
  # ---------------------------------------------------------------------
  lint:
    name: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install lint tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck

      - name: bash -n on shell scripts
        run: |
          for f in scripts/*.sh docker/*.sh; do
            bash -n "$f"
          done

      - name: shellcheck
        run: shellcheck scripts/*.sh docker/*.sh

      - name: hadolint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile
          # DL3008 (pin apt versions), DL3015 (no --no-install-recommends) — opt-in later
          ignore: DL3008,DL3015

  # ---------------------------------------------------------------------
  # Docker image build. Ensures the Dockerfile + tests/librx888/ layout
  # produces a working image. Runtime smoketest is skipped — needs hw.
  # ---------------------------------------------------------------------
  docker:
    name: docker build
    runs-on: ubuntu-24.04
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -f docker/Dockerfile -t gr-rx888:ci .

      - name: Image can run preflight (will fail at step 1 — no device — expected)
        run: |
          set +e
          docker run --rm gr-rx888:ci rx888_preflight
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "preflight passed in CI without hardware — unexpected"
            exit 1
          fi
          echo "preflight failed cleanly with exit $rc (expected; no device)"
